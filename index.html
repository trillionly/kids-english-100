<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids English 100</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>🚀 Kids English 100</h1>
      <p class="subtitle">초등 저학년용 일상 영어 회화</p>
    </header>

    <main class="card-wrap">
      <div class="card">
        <div class="badge">
          <span id="phrase-number">1 / 100</span>
          <span id="phrase-category">play</span>
        </div>

        <p id="english" class="english">It's my turn now.</p>

        <p id="korean" class="korean hidden">이제 내 차례야.</p>

        <div class="button-group">
          <button id="speak-btn" class="btn primary">🔊 듣기</button>
          <button id="meaning-btn" class="btn secondary">👀 뜻 보기</button>
          <button id="next-btn" class="btn accent">➡️ 다음</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
