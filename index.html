<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids English 100</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Kids English Steps</h1>
      <p class="subtitle">Simple step-by-step English phrase practice</p>
    </header>

    <main>
      <section id="steps-screen">
        <div class="steps-header">
          <h2>Choose a Step</h2>
          <p>Each step has 3 phrases. Complete each phrase 5 times.</p>
        </div>
        <div id="steps-grid" class="steps-grid"></div>
      </section>

      <section id="learning-screen" class="hidden">
        <div class="learning-header">
          <button id="back-btn" class="text-btn" type="button">Back to Steps</button>
        </div>

        <div class="card-wrap">
          <div class="card">
            <div class="badge">
              <span id="step-label">Step 1</span>
              <span id="phrase-status">Phrase 1 / 3</span>
            </div>

            <p id="english" class="english">It's my turn now.</p>
            <p id="korean" class="korean hidden">이제 내 차례야.</p>

            <p id="repeat-status" class="repeat-status">Completed 0 / 5</p>

            <div class="button-group">
              <button id="speak-btn" class="btn primary" type="button">Listen</button>
              <button id="meaning-btn" class="btn secondary" type="button">Show Meaning</button>
              <button id="complete-btn" class="btn accent" type="button">Complete</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
